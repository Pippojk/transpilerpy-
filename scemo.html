<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python → JS Viewer</title>
</head>
<body>

    <h1>Prova a scrivere il tuo codice Python</h1>

    <!-- area di input -->
    <textarea id="pycode" rows="10" cols="50" placeholder="Scrivi qui il codice Python..."></textarea>

    <br><br>
    <button id="transformBtn">Trasforma in JS</button>

    <h2>Codice JavaScript generato:</h2>
    <pre id="jsresult"></pre>

    <!-- collegamento al tuo JS esterno -->
    <script src="transformer.js"></script>

</body>
</html>
